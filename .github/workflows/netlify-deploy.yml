name: Deploy to Netlify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: "deploy-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  ci:
    name: CI - Lint, Type Check, and Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run linter
        run: npm run lint

      - name: Run type check
        run: npm run typecheck

      - name: Build application
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          VITE_BASE_PATH: ${{ secrets.VITE_BASE_PATH }}
          VITE_DEV_BYPASS_AUTH: "false"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 3

  migrate:
    name: Apply Supabase Migrations
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link to Supabase project
        run: supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_REF }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Run migrations and seed reference data
        run: supabase db push --include-seed
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Migration and seed completed
        run: echo "Migrations and reference data applied successfully to production database"

  deploy-production:
    name: Deploy to Netlify (Production)
    runs-on: ubuntu-latest
    needs: [ci, migrate]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2.1
        with:
          publish-dir: './dist'
          production-deploy: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy from GitHub Actions - ${{ github.sha }}"
          enable-pull-request-comment: false
          enable-commit-comment: true
          overwrites-pull-request-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5

  deploy-preview:
    name: Deploy to Netlify (Preview)
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'pull_request'
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v2.1
        with:
          publish-dir: './dist'
          production-deploy: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "Deploy preview from PR #${{ github.event.number }}"
          enable-pull-request-comment: true
          enable-commit-comment: false
          overwrites-pull-request-comment: true
          alias: pr-${{ github.event.number }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        timeout-minutes: 5

  create-issue-on-failure:
    name: Create Issue on Deploy Failure
    runs-on: ubuntu-latest
    needs: [ci, migrate, deploy-production]
    if: ${{ always() && (needs.ci.result == 'failure' || needs.migrate.result == 'failure' || needs.deploy-production.result == 'failure') }}
    steps:
      - name: Create issue on failure
        uses: actions/github-script@v7
        with:
          script: |
            const jobNames = {
              ci: 'CI (Lint, Type Check, Build)',
              migrate: 'Supabase Migrations',
              'deploy-production': 'Netlify Deploy'
            };

            const failedJobs = [];
            if ('${{ needs.ci.result }}' === 'failure') failedJobs.push(jobNames.ci);
            if ('${{ needs.migrate.result }}' === 'failure') failedJobs.push(jobNames.migrate);
            if ('${{ needs.deploy-production.result }}' === 'failure') failedJobs.push(jobNames['deploy-production']);

            const title = '🚨 Deployment Failed';
            const body = `The deployment workflow has failed.\n\n` +
              `**Failed Jobs:** ${failedJobs.join(', ')}\n` +
              `**Run ID:** ${{ github.run_id }}\n` +
              `**Commit:** ${{ github.sha }}\n` +
              `**Branch:** ${{ github.ref_name }}\n` +
              `**Triggered by:** ${{ github.actor }}\n` +
              `**Time:** ${new Date().toISOString()}\n\n` +
              `Please check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.`;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'deployment-failure'
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['deployment-failure', 'bug']
              });
            } else {
              const commentBody = `**Another deployment failure detected**\n\n` +
                `**Failed Jobs:** ${failedJobs.join(', ')}\n` +
                `**Run ID:** ${{ github.run_id }}\n` +
                `**Commit:** ${{ github.sha }}\n` +
                `**Branch:** ${{ github.ref_name }}\n` +
                `**Time:** ${new Date().toISOString()}\n\n` +
                `[View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issues.data[0].number,
                body: commentBody
              });
            }